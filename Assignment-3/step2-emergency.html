<h2>Step 2 &mdash; Emergency Contact</h2>
<p class="help">Please provide a contact we can reach in case of a medical emergency.</p>

<form action="step3-insurance.html" id="step2-form" novalidate>
  <fieldset>
    <legend>Emergency Contact</legend>
    <table class="form-table">
      <tr>
        <td>
          <label for="em_name">Full Name</label><br>
          <input type="text" id="em_name" name="emergency_name"
                 maxlength="60"
                 pattern="^[A-Za-z\-' ]{2,60}$"
                 title="Enter the full name of your emergency contact person (first and last name)."
                 required>
        </td>
        <td>
          <label for="em_rel">Relationship</label><br>
          <input type="text" id="em_rel" name="emergency_relationship"
                 maxlength="40"
                 title="Enter your relationship to this person (e.g., Spouse, Parent, Sibling, Friend)."
                 required>
        </td>
      </tr>
      <tr>
        <td>
          <label for="em_phone">Phone</label><br>
          <input type="tel" id="em_phone" name="emergency_phone"
                 placeholder="(555) 555-5555"
                 title="Enter the primary phone number where we can reach your emergency contact — 10 digits in format (###) ###-####."
                 required>
        </td>
        <td>
          <label for="em_phone2">Alternate Phone (optional)</label><br>
          <input type="tel" id="em_phone2" name="emergency_phone_alt"
                 placeholder="(555) 555-5555"
                 title="Optional: Enter a secondary or alternate phone number for your emergency contact.">
        </td>
      </tr>
    </table>
  </fieldset>

  <div class="actions">
    <a class="btn secondary" href="index.html"
       title="Go back to the Patient Information step.">&larr; Back</a>
    <button type="submit" class="primary"
            title="Save your emergency contact information and proceed to Insurance.">Save &amp; Continue &rarr;</button>
    <button type="reset" class="danger"
            title="Clear all fields on this page.">CLEAR AND START OVER</button>
  </div>
</form>
  </div>
</div>
