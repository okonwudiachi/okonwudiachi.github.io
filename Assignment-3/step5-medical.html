  <div class="card">
<h2>Step 5 &mdash; Medical Information</h2>
<p class="help">Please provide a brief medical snapshot to help our care team prepare for your visit.</p>

<form action="step6-consents.html" id="step5-form" novalidate>
  <fieldset>
    <legend>Medical Profile</legend>
    <table class="form-table">
      <tr>
        <td>
          <label for="meds">Current Medications</label><br>
          <textarea id="meds" name="current_medications" rows="3" cols="50"
                    placeholder="List medications and dosages (if known)…"
                    title="List all prescription and over-the-counter medications you currently take, including dosage and frequency if known. Separate each medication on a new line."></textarea>
        </td>
      </tr>
      <tr>
        <td>
          <label for="allergy_detail">Allergies &amp; Reactions</label><br>
          <textarea id="allergy_detail" name="allergies" rows="3" cols="50"
                    placeholder="List allergies and reactions…"
                    title="List all known allergies (medications, foods, latex, environmental, etc.) and describe your reaction to each one. Example: Penicillin — rash and swelling."></textarea>
        </td>
      </tr>
    </table>
  </fieldset>

  <fieldset>
    <legend>Primary Care Provider</legend>
    <table class="form-table">
      <tr>
        <td>
          <label for="pcp_name">PCP Name</label><br>
          <input type="text" id="pcp_name" name="pcp_name"
                 maxlength="60"
                 title="Enter the full name of your primary care physician or provider (e.g., Dr. Jane Smith). Leave blank if you do not have one.">
        </td>
        <td>
          <label for="pcp_phone">PCP Phone</label><br>
          <input type="tel" id="pcp_phone" name="pcp_phone"
                 placeholder="(555) 555-5555"
                 title="Enter your primary care provider's office phone number so we can coordinate care if needed.">
        </td>
      </tr>
    </table>
  </fieldset>

  <div class="actions">
    <a class="btn secondary" href="step4-guarantor.html"
       title="Go back to the Guarantor step.">&larr; Back</a>
    <button type="submit" class="primary"
            title="Save medical information and proceed to Consents &amp; Signature.">Save &amp; Continue &rarr;</button>
    <button type="reset" class="danger"
            title="Clear all fields on this page.">CLEAR AND START OVER</button>
  </div>
</form>
  </div>
</div>
