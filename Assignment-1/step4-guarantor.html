  <div class="card">
<h2>Step 4 — Guarantor / Responsible Party</h2>
<p class="help">Fill this out if someone else is financially responsible (e.g., parent/guardian).</p>

<form action="step5-medical.html">
  <fieldset>
    <legend>Guarantor</legend>
    <table class="form-table">
      <tr>
        <td>
          <label for="g_name">Guarantor Name</label><br>
          <input type="text" id="g_name" name="guarantor_name" maxlength="60">
        </td>
        <td>
          <label for="g_rel">Relationship to Patient</label><br>
          <input type="text" id="g_rel" name="guarantor_relationship" maxlength="40">
        </td>
      </tr>
      <tr>
        <td>
          <label for="g_phone">Guarantor Phone</label><br>
          <input type="tel" id="g_phone" name="guarantor_phone" placeholder="(555) 555-5555">
        </td>
        <td>
          <label for="g_email">Guarantor Email</label><br>
          <input type="email" id="g_email" name="guarantor_email" placeholder="name@domain.tld">
        </td>
      </tr>
      <tr>
        <td colspan="2">
          <label for="g_addr">Guarantor Address</label><br>
          <input type="text" id="g_addr" name="guarantor_address" maxlength="120" placeholder="Street, City, State ZIP">
        </td>
      </tr>
    </table>
  </fieldset>

  <div class="actions">
    <a class="btn secondary" href="step3-insurance.html">← Back</a>
    <button type="submit" class="primary">Save & Continue →</button>
    <button type="reset" class="danger">CLEAR AND START OVER</button>
  </div>
</form>
  </div>
</div>
<iframe class="include-frame" src="footer.html" title="Footer" width="100%" height="167px" frameborder="0" scrolling="no"></iframe>
</body>
