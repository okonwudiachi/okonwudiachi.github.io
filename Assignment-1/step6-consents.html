<h2>Step 6 — Consents & Signature</h2>
<p class="help">Final acknowledgements. When you submit, you will be sent to <code>thankyou.html</code>.</p>

<form action="thankyou.html">
  <fieldset>
    <legend>Consent & Acknowledgements</legend>
    <table class="form-table">
      <tr>
        <td>
          <label><input type="checkbox" name="consent_to_treat" value="1" required> I consent to treatment.</label><br>
          <label><input type="checkbox" name="financial_policy_ack" value="1" required> I acknowledge the financial policy.</label><br>
          <label><input type="checkbox" name="hipaa_npp_ack" value="1" required> I acknowledge receipt of the HIPAA Notice of Privacy Practices.</label><br>
          <label><input type="checkbox" name="communication_consent" value="1"> I consent to electronic communication (email/text).</label>
        </td>
      </tr>
    </table>
  </fieldset>

  <fieldset>
    <legend>Signature</legend>
    <table class="form-table">
      <tr>
        <td>
          <label for="sig_name">Printed Name</label><br>
          <input type="text" id="sig_name" name="signature_print_name" maxlength="60" required>
        </td>
        <td>
          <label for="sig_date">Signature Date (MM/DD/YYYY)</label><br>
          <input type="text" id="sig_date" name="signature_date" placeholder="02/09/2026"
                 pattern="^(0[1-9]|1[0-2])/(0[1-9]|[12][0-9]|3[01])/(19|20)\d\d$" required>
        </td>
      </tr>
      <tr>
        <td colspan="2">
          <label for="signature">Signature (type your name)</label><br>
          <input type="text" id="signature" name="signature" maxlength="80" placeholder="Type full name as signature" required>
        </td>
      </tr>
    </table>
  </fieldset>

  <div class="actions">
    <a class="btn secondary" href="step5-medical.html">← Back</a>
    <button type="submit" class="primary">Submit Registration</button>
    <button type="reset" class="danger">CLEAR AND START OVER</button>
  </div>
</form>
