<html lang="en">

  <meta charset="utf-8">

  <title>Patient Registration - Step 5</title>
  <link href="style.css" rel="stylesheet">
</head>
<body>

<iframe class="include-frame" src="header.html" title="Header" width="100%" height="103px" frameborder="0" scrolling="no"></iframe>

<div id="middle">
  <div class="step-nav" aria-label="Registration steps navigation">
      <a href="index.html" class="">1) Patient Info</a>
      <a href="step2-emergency.html" class="">2) Emergency Contact</a>
      <a href="step3-insurance.html" class="">3) Insurance</a>
      <a href="step4-guarantor.html" class="">4) Guarantor</a>
      <a href="step5-medical.html" class="active">5) Medical Info</a>
      <a href="step6-consents.html" class="">6) Consents & Submit</a>
      <a href="thankyou.html" style="float:right;">(Preview) Thank You Page</a>
  </div>

  <div class="card">
<h2>Step 5 — Medical Information</h2>
<p class="help">A brief medical snapshot aligned with the data dictionary.</p>

<form action="step6-consents.html">
  <fieldset>
    <legend>Medical Profile</legend>
    <table class="form-table">
      <tr>
        <td>
          <label for="meds">Current Medications</label><br>
          <textarea id="meds" name="current_medications" rows="3" cols="50" placeholder="List medications and dosages (if known)…"></textarea>
        </td>
      </tr>
      <tr>
        <td>
          <label for="allergy_detail">Allergies</label><br>
          <textarea id="allergy_detail" name="allergies" rows="3" cols="50" placeholder="List allergies and reactions…"></textarea>
        </td>
      </tr>
    </table>
  </fieldset>

  <fieldset>
    <legend>Primary Care Provider</legend>
    <table class="form-table">
      <tr>
        <td>
          <label for="pcp_name">PCP Name</label><br>
          <input type="text" id="pcp_name" name="pcp_name" maxlength="60">
        </td>
        <td>
          <label for="pcp_phone">PCP Phone</label><br>
          <input type="tel" id="pcp_phone" name="pcp_phone" placeholder="(555) 555-5555">
        </td>
      </tr>
    </table>
  </fieldset>

  <div class="actions">
    <a class="btn secondary" href="step4-guarantor.html">← Back</a>
    <button type="submit" class="primary">Save & Continue →</button>
    <button type="reset" class="danger">CLEAR AND START OVER</button>
  </div>
</form>
  </div>
</div>
<iframe class="include-frame" src="footer.html" title="Footer" width="100%" height="167px" frameborder="0" scrolling="no"></iframe>
</body>
</html>
