<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>Bluebonnet Health Footer</title>
  <link href="style.css" rel="stylesheet">
</head>
<body>
  <div id="bottom">
  <div class="footer-grid">
    <div>
      <div style="font-weight:900; font-size:1.05rem;"><strong>Bluebonnet Health Clinic</strong></div>
      <div class="small">PO BOX 18881</div>
      <div class="small">2478 Cypress Meadow Dr, Sugar Land, TX 77002</div>
      <div class="small" style="margin-top:10px;">
        <div>Follow us:</div>
        <div>
        <span class="footer-links">
          <a href="https://facebook.com" target="_blank" rel="noopener" title="Facebook">
            <img src="icon_facebook.png" alt="Facebook icon">
          </a> •
          <a href="https://x.com" target="_blank" rel="noopener" title="X (Twitter)">
            <img src="icon_x.png" alt="X icon">
          </a> •
          <a href="https://LinkedIn.com" target="_blank" rel="noopener" title="LinkedIn">
            <img src="InBug-White.png" alt="LinkedIn icon">
          </a>
        </span>
        </div>
      </div>
    </div>

    <!-- Clickable element: button (no JS required) -->
    <form action="mailto:contact@werdocs.example" id="contactForm">
      <button class="primary" type="submit">Contact Us</button>
    </form>
  </div>
</div>
</body>
</html>
